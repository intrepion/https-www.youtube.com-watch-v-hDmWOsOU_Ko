name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Flutter
        if: ${{ hashFiles('workspace/pubspec.yaml') != '' }}
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ensure declared assets exist
        if: ${{ hashFiles('workspace/pubspec.yaml') != '' }}
        working-directory: workspace
        run: ./tool/ensure_box_asset.sh

      - name: Restore
        if: ${{ hashFiles('workspace/pubspec.yaml') != '' }}
        working-directory: workspace
        run: flutter pub get

      - name: Verify formatting
        if: ${{ hashFiles('workspace/pubspec.yaml') != '' }}
        working-directory: workspace
        run: dart format --output=none --set-exit-if-changed lib test integration_test

      - name: Test with coverage
        if: ${{ hashFiles('workspace/pubspec.yaml') != '' }}
        working-directory: workspace
        run: flutter test --branch-coverage

      - name: Check coverage
        if: ${{ hashFiles('workspace/pubspec.yaml') != '' }}
        working-directory: workspace
        run: bash tool/check_coverage.sh 97 97
